<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
      <img src="{{img}}" data-edit="img" title="{{name}}"/>
      <div class="header-fields">
          <h1 class="charname"><input name="name" type="text" value="{{name}}" placeholder="{{localize 'SFTD.Name'}}"/></h1>
      </div>
  </header>

  {{!-- Sheet Body --}}
  <section class="sheet-body flex-vertical">
    <label class="label-stripe">{{localize "SFTD.Description"}}</label>
    {{editor system.description target="system.description" button=true editable=editable}}
    {{#if isGM}}
<!--      <div class="label-stripe">{{localize "SFTD.Logic"}}</div>
      <textarea name="system.logic">{{{system.logic}}}</textarea>
-->
      <div class="label-stripe">{{localize "SFTD.Effects"}}</div>
      <div id="effects">{{> "systems/songs-for-the-dusk/templates/parts/active-effects.html"}}</div>
    {{/if}}
  </section>
</form>
