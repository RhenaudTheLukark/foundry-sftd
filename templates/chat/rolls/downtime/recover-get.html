<div class="dice-tooltip blades-die-tooltip">
  <div class="chat-label label-stripe-chat">{{localize 'SFTD.RecoverRoll'}}</div>

  <div class="description">
    <p>{{{localize 'SFTD.RollRecover'}}} {{#if levelOneHarm}}{{{localize 'SFTD.RollRecoverLevelOneHarm'}}} {{/if}}{{{localize 'SFTD.RollRecoverResultFull'}}}</p>
  </div>

  {{#if extraFields.modifier_text}}
  <div class="description">
    <p>{{{extraFields.modifier_text}}}</p>
  </div>
  {{/if}}

  {{#if note}}
  <em>{{note}}</em>
  {{/if}}
</div>
